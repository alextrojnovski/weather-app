name: CD - Build and Deploy

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/weather-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Extract metadata
      id: meta
      run: |
        echo "version=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
        echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile
        push: true
        tags: |
          ${{ env.DOCKER_IMAGE }}:latest
          ${{ env.DOCKER_IMAGE }}:${{ steps.meta.outputs.version }}
          ${{ env.DOCKER_IMAGE }}:${{ steps.meta.outputs.sha_short }}
        cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache
        cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache,mode=max

  # Опционально: деплой на staging
  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Configure kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: 'latest'
    
    - name: Deploy to staging
      run: |
        echo "🚀 Deploying to staging environment"
        # Здесь можно добавить команды для деплоя
        # Например: kubectl set image deployment/weather-app weather-app=${{ env.DOCKER_IMAGE }}:${{ github.sha }}
