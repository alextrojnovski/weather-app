---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  become: yes

- name: Install common packages
  apt:
    name:
      - git
      - curl
      - wget
      - vim
      - htop
      - python3-pip
      - python3-venv
      - build-essential
    state: present
  become: yes
